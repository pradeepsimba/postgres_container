# =============================================================================
# PostgreSQL 17 — Advanced Production Configuration
# Tuned for: 32GB+ RAM, SSD/NVMe, high-throughput algo trading workload
# =============================================================================

# -----------------------------------------------------------------------------
# Connection & Authentication
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 100
superuser_reserved_connections = 3
password_encryption = scram-sha-256
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6
client_connection_check_interval = 5000

# -----------------------------------------------------------------------------
# Memory — Aggressive caching for low-latency reads
# -----------------------------------------------------------------------------
shared_buffers = 8GB
work_mem = 64MB
hash_mem_multiplier = 2.0
maintenance_work_mem = 2GB
effective_cache_size = 24GB
huge_pages = try
temp_buffers = 64MB

# -----------------------------------------------------------------------------
# WAL — Optimized for write throughput
# -----------------------------------------------------------------------------
wal_level = replica
wal_buffers = 64MB
max_wal_size = 8GB
min_wal_size = 2GB
wal_compression = lz4
wal_writer_delay = 200ms
wal_writer_flush_after = 1MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
archive_mode = off
full_page_writes = on
wal_log_hints = on
wal_recycle = on
wal_init_zero = on

# -----------------------------------------------------------------------------
# Background Writer — Smooth dirty page flushing
# -----------------------------------------------------------------------------
bgwriter_delay = 50ms
bgwriter_lru_maxpages = 400
bgwriter_lru_multiplier = 4.0
bgwriter_flush_after = 512kB

# -----------------------------------------------------------------------------
# Query Planner — SSD-aware, stats-heavy
# -----------------------------------------------------------------------------
random_page_cost = 1.1
seq_page_cost = 1.0
effective_io_concurrency = 200
maintenance_io_concurrency = 200
default_statistics_target = 500
cpu_tuple_cost = 0.003
cpu_index_tuple_cost = 0.001
cpu_operator_cost = 0.0005
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# -----------------------------------------------------------------------------
# Parallelism — Full utilization
# -----------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
parallel_leader_participation = on
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB

# -----------------------------------------------------------------------------
# Autovacuum — Aggressive for high-churn trading tables
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 15s
autovacuum_vacuum_threshold = 25
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_threshold = 10
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_insert_threshold = 1000
autovacuum_vacuum_insert_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 1000

# -----------------------------------------------------------------------------
# Logging — Structured diagnostics
# -----------------------------------------------------------------------------
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 256MB
log_truncate_on_rotation = on
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 250
log_line_prefix = '%m [%p] %q%u@%d '
log_statement = 'ddl'
log_replication_commands = on
log_timezone = 'Asia/Kolkata'

# -----------------------------------------------------------------------------
# Statistics & Monitoring
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
track_activities = on
track_counts = on
track_io_timing = on
track_wal_io_timing = on
track_functions = 'all'
compute_query_id = on

# pg_stat_statements
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.track_planning = on

# -----------------------------------------------------------------------------
# Lock Management
# -----------------------------------------------------------------------------
deadlock_timeout = 1s
max_locks_per_transaction = 128

# -----------------------------------------------------------------------------
# Statement Behavior & Timeouts
# -----------------------------------------------------------------------------
idle_in_transaction_session_timeout = 300000
statement_timeout = 60000
lock_timeout = 30000

# -----------------------------------------------------------------------------
# Disk & I/O
# -----------------------------------------------------------------------------
temp_file_limit = 10GB
backend_flush_after = 256kB

# -----------------------------------------------------------------------------
# Timezone
# -----------------------------------------------------------------------------
timezone = 'Asia/Kolkata'
