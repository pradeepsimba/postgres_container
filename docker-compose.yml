services:
  algo_db:
    container_name: algo_db
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ab45cd12
      - POSTGRES_DB=algo
      - POSTGRES_INITDB_ARGS=--data-checksums --encoding=UTF8 --locale=C
      - TZ=Asia/Kolkata
      - PGTZ=Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
      - ./initdb:/docker-entrypoint-initdb.d:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    restart: always
    shm_size: 8g
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 30G
    sysctls:
      - net.core.somaxconn=4096
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d algo && psql -U postgres -d algo -c 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 60s
